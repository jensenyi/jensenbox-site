name: Deploy personal site to Alibaba OSS

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: personal-site-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm release
        run: echo "Manual release approved by repository owner"
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install OSS SDK
        run: python -m pip install --disable-pip-version-check oss2

      - name: Upload website files
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: https://oss-cn-hongkong.aliyuncs.com
          OSS_BUCKET: jensenbox-site-2026
        run: python .github/scripts/deploy_oss.py
